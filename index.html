<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelLedger Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.9); }
        }
        .animate-blink {
            animation: blink 1s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        .print-only { display: none; }

        @media print {
            .no-print, .no-print * { display: none !important; }
            .print-only { display: block !important; }
            body { 
                background: white !important; 
                color: black !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                margin: 0 !important;
                padding: 0 !important;
                font-size: 10pt;
            }
            #root { padding: 0 !important; margin: 0 !important; }
            @page { 
                size: A4;
                margin: 0; 
            }
            .voucher-page { 
              width: 100% !important;
              max-width: 100% !important;
              margin: 0 !important;
              box-shadow: none !important;
              border: none !important;
              background: white !important;
            }
        }

        /* High Fidelity Styles for PDF Capture */
        .pdf-export-container {
            background: white !important;
            color: #0f172a !important;
            padding: 20px !important;
        }
        .pdf-export-container * {
            color: #0f172a !important;
            border-color: #e2e8f0 !important;
        }
        .pdf-export-container .bg-white,
        .pdf-export-container .dark\:bg-slate-900,
        .pdf-export-container .bg-slate-50\/50 {
            background-color: white !important;
        }
        .pdf-export-container .no-print {
            display: none !important;
        }

        .pdf-export-container div.overflow-x-auto {
            overflow: visible !important;
            margin-left: 0 !important;
            margin-right: 0 !important;
            padding-left: 0 !important;
            padding-right: 0 !important;
            width: 100% !important;
        }

        /* Forces standardized layout during export, bypassing desktop-specific md: classes */
        .pdf-export-container .md\:flex-row { flex-direction: column !important; }
        .pdf-export-container .md\:flex-nowrap { flex-wrap: wrap !important; }
        .pdf-export-container .md\:items-center { items: flex-start !important; }
        .pdf-export-container .md\:justify-between { justify-content: flex-start !important; }
        .pdf-export-container .md\:w-auto { width: 100% !important; }
        .pdf-export-container .md\:ml-2 { margin-left: 0 !important; }
        .pdf-export-container .md\:pl-4 { padding-left: 0 !important; }
        .pdf-export-container .md\:border-l { border-left-width: 0 !important; }
        
        .pdf-export-container table {
            width: 100% !important;
            table-layout: fixed !important; /* Force fixed layout for predictable column widths */
            min-width: 1000px !important; /* Ensure table gets its full width during capture */
            border-collapse: collapse !important;
        }

        .pdf-export-container table th,
        .pdf-export-container table td {
            padding: 6px 8px !important; /* Slightly more breathable than before */
            font-size: 9px !important; /* Standardized small but readable font */
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            border: 1px solid #e2e8f0 !important; /* Better contrast in PDF */
        }

        /* Specifically target columns for perfect 9-column fit */
        .pdf-export-container table th:nth-child(1), .pdf-export-container table td:nth-child(1) { width: 9% !important; }
        .pdf-export-container table th:nth-child(2), .pdf-export-container table td:nth-child(2) { width: 9% !important; }
        .pdf-export-container table th:nth-child(3), .pdf-export-container table td:nth-child(3) { width: 12% !important; }
        .pdf-export-container table th:nth-child(4), .pdf-export-container table td:nth-child(4) { width: 18% !important; }
        .pdf-export-container table th:nth-child(5), .pdf-export-container table td:nth-child(5) { width: 14% !important; }
        .pdf-export-container table th:nth-child(6), .pdf-export-container table td:nth-child(6) { width: 13% !important; }
        .pdf-export-container table th:nth-child(7), .pdf-export-container table td:nth-child(7) { width: 10% !important; }
        .pdf-export-container table th:nth-child(8), .pdf-export-container table td:nth-child(8) { width: 5% !important; }
        .pdf-export-container table th:nth-child(9), .pdf-export-container table td:nth-child(9) { width: 10% !important; }

        .show-on-export { display: none; }
        .exporting .show-on-export { display: block !important; }
        .exporting .no-print { display: none !important; }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "express": "https://esm.sh/express@^5.2.1",
    "mongoose": "https://esm.sh/mongoose@^9.2.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
